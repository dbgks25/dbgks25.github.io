# Site settings
title: "깡돌 · 논문 & 과제 아카이브"
email: dbgks25@uos.ac.kr
description: >-
  직접 작성한 논문과 수행한 연구과제를 정리하는 개인 아카이브입니다.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dbgks25.github.io" # the base hostname & protocol for your site
twitter_username: dbgks25
github_username: dbgks25

# Build settings
markdown: kramdown
highlighter: rouge
# 논문·과제 글은 깔끔한 URL(/paper/제목/)을 사용합니다.
permalink: /paper/:title/

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

# Plugins (GitHub Pages compatible only)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /:collection/:name/

# GitHub Pages doesn't support jekyll-paginate-v2 or autopages
# Using simple tag collection approach instead

# Default front matter
defaults:
  # 기본 소셜 공유 이미지(og:image) — 페이지에 image가 없으면 이 값을 사용
  - scope:
      path: ""
    values:
      image: /assets/img/og-default.png
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "paper"
      author: "한유한"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      author: "한유한"

# Site navigation
navigation:
  - title: "Home"
    url: "/"
  - title: "Paper"
    url: "/paper/"
  - title: "Projects"
    url: "/projects/"
  - title: "About"
    url: "/about/"

# SEO and social
author:
  name: "한유한"
  email: "dbgks25@uos.ac.kr"
  twitter: ""

social:
  name: "한유한"
  links:
    - "https://github.com/dbgks25"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - LICENSE
  - CHANGELOG.md
  - BLOG_GUIDE.md
  - SECURITY.md
  - WORKFLOW.md
  - run_local.bat
